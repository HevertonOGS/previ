name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  affected:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive base/head SHAs for affected commands
        uses: nrwl/nx-set-shas@v4

      - name: Show affected projects
        run: npx nx show projects --affected

      - name: Lint affected projects
        run: npx nx affected -t lint --parallel=3

      - name: Unit test affected projects
        run: npx nx affected -t test --exclude=api-e2e,web-e2e --parallel=3
